name: CI

on:
  push:
    branches: [main]
  pull_request:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  web:
    name: Web — lint, typecheck, build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: corepack enable pnpm
      - uses: actions/cache@v5
        with:
          path: ~/.local/share/pnpm/store
          key: pnpm-${{ runner.os }}-${{ hashFiles('pnpm-lock.yaml') }}
      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter web lint
      - run: pnpm --filter web exec tsc --noEmit
      - run: pnpm --filter web build

  api:
    name: API — lint, typecheck, test
    runs-on: ubuntu-latest
    services:
      postgres:
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: app
          POSTGRES_PASSWORD: app
          POSTGRES_DB: app_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U app"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
      redis:
        image: redis:7-alpine
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 2s
          --health-timeout 3s
          --health-retries 15
    env:
      DATABASE_URL: postgresql+asyncpg://app:app@localhost:5432/app_test
      REDIS_URL: redis://localhost:6379/1
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: uv sync --frozen
      - run: uv run ruff check .
      - run: uv run ruff format --check .
      - run: uv run mypy
      - name: Enable pgvector extension
        run: |
          PGPASSWORD=app psql -h localhost -U app -d app_test \
            -c "CREATE EXTENSION IF NOT EXISTS vector;"
      - run: uv run pytest

  client-freshness:
    name: Generated client is up to date
    runs-on: ubuntu-latest
    env:
      # Settings only need to import — no real connections are made.
      DATABASE_URL: postgresql+asyncpg://ci:ci@localhost:5432/ci
      REDIS_URL: redis://localhost:6379/0
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v6
        with:
          node-version: 22
      - run: corepack enable pnpm
      - uses: astral-sh/setup-uv@v8
        with:
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - run: cd apps/api && uv sync --frozen
      - run: make generate-client
      - name: Fail if schema or client drifted
        run: git diff --exit-code apps/web/lib/api/
